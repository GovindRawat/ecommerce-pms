services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: shophub_dev
      POSTGRES_USER: shophub_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U shophub_user -d shophub_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./server

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: shophub_dev
      DB_USER: shophub_user
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000

    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3000

    depends_on:
      api:
        condition: service_started

    ports:
      - "8080:80"

volumes:
  pgdata: