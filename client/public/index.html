<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShopHub - your one-stop e-commerce destination for quality products" />
    <title>ShopHub | Home</title>
</head>
<body>
     <!-- HEADER: site-wide navigation -->
 <header>
  <section>
    <!-- Logo / brand name -->
   <h1>
    <a href="/">ShopHub</a>
   </h1>
  </section>
 <!-- Primary navigation (<nav>) with Home, Products, Cart, Login links -->
    <nav aria-label="Primary navigation">
        <ul>
            <li><a href="/"><h2>Home</h2></a></li>
            <li><a href="/products"></a><h2>Products</h2></li>
            <li><a href="/cart"><h2>Cart</h2></a></li>
            <li><a href="/login"><h2>Login</h2></a></li>
        </ul>
    </nav>
 <!-- Search bar (use <form> and <input type="search">) -->
    <form>
      <label for="site-search">Search products:</label>
      <input type="search" id="site-search" name="q" placeholder="Search for quality products..."/>
      <button type="submit">Search</button>
    </form>
 </header>
</body>
</html>
